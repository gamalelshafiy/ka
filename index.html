<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEMY SPORT — قريباً</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }
    .stars { position: fixed; inset: 0; pointer-events: none; }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.9; } }
    .logo-badge {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #1a6fff, #0d4fcc);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      border: 1.5px solid rgba(255,255,255,0.15);
      margin-bottom: 1rem;
      text-align: center; line-height: 1.3;
    }
    .logo-text { font-size: 30px; font-weight: 700; color: #fff; margin-bottom: 2rem; letter-spacing: 2px; }
    .logo-text span { color: #1a6fff; }
    .coming-label { font-size: 12px; letter-spacing: 4px; color: #1a6fff; margin-bottom: 0.75rem; }
    .headline { font-size: 22px; font-weight: 600; color: #fff; text-align: center; margin-bottom: 0.5rem; }
    .subline { font-size: 14px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 2.5rem; }
    .countdown-wrap { display: flex; gap: 16px; margin-bottom: 2.5rem; }
    .cd-box {
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 20px; min-width: 72px;
    }
    .cd-num { font-size: 30px; font-weight: 700; color: #1a6fff; line-height: 1; }
    .cd-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 6px; }
    .progress-wrap {
      width: 300px; height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px; overflow: hidden; margin-bottom: 1.5rem;
    }
    .progress-bar { height: 100%; background: linear-gradient(90deg,#1a6fff,#4d8fff); border-radius: 99px; transition: width 1s linear; }
    .footer-note { font-size: 13px; color: rgba(255,255,255,0.3); }
    .footer-note span { color: rgba(26,111,255,0.8); }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="logo-badge">GEMY<br>SPORT</div>
  <div class="logo-text">GEMY <span>SPORT</span></div>
  <div class="coming-label">— قريباً —</div>
  <div class="headline">الموقع يعود بشكل جديد</div>
  <div class="subline">بث مباشر · أخبار · IPTV · رسيفرات</div>

  <div class="countdown-wrap">
    <div class="cd-box"><div class="cd-num" id="cd-sec">00</div><div class="cd-label">ثانية</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-min">00</div><div class="cd-label">دقيقة</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-hr">00</div><div class="cd-label">ساعة</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-day">00</div><div class="cd-label">يوم</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>
  <div class="footer-note">سيُفتح الموقع تلقائياً في <span>1 مايو 2026</span></div>

  <script>
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2.5 + 0.5;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s;`;
      starsEl.appendChild(s);
    }

    const target = new Date('2026-05-01T00:00:00');
    const start  = new Date('2026-03-28T00:00:00');
    const totalMs = target - start;
    function pad(n) { return String(n).padStart(2, '0'); }
    function update() {
      const now = new Date();
      const diff = target - now;
      if (diff <= 0) {
        window.location.replace('./home.html'); // ← اسم ملف موقعك الأصلي
        return;
      }
      document.getElementById('cd-day').textContent = pad(Math.floor(diff / 86400000));
      document.getElementById('cd-hr').textContent  = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('cd-min').textContent = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('cd-sec').textContent = pad(Math.floor((diff % 60000) / 1000));
      const pct = Math.min(100, ((now - start) / totalMs) * 100);
      document.getElementById('prog').style.width = pct.toFixed(2) + '%';
    }
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
